<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <style>
    .bg   { fill: #ffffff; }
    .ink  { stroke: #1b1b1b; }
    .inkf { fill:   #1b1b1b; }
    @media (prefers-color-scheme: dark) {
      .bg   { fill: #000000; }
      .ink  { stroke: #f2ede2; }
      .inkf { fill:   #f2ede2; }
    }
  </style>

  <rect class="bg" x="2" y="2" width="44" height="44" rx="10"/>

  <g class="ink" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round">

    <!-- floating M medallion -->
    <circle cx="15.5" cy="10.5" r="3.6" fill="#c9a84c"/>
    <text x="15.5" y="12.4" font-family="Georgia, serif" font-size="4.4" font-weight="700" text-anchor="middle" stroke="none" class="inkf">M</text>

    <!-- bubbles -->
    <circle cx="30.5" cy="10" r="1.1" fill="none"/>
    <circle cx="33" cy="7.8" r="0.8" fill="none"/>
    <circle cx="31.5" cy="13" r="0.7" fill="none"/>

    <!-- legs + feet -->
    <path d="M21,39 L19.5,44" fill="none" stroke-width="1.6"/>
    <path d="M27,39 L28.5,44" fill="none" stroke-width="1.6"/>
    <ellipse cx="18.6" cy="44.2" rx="2" ry="1.1" class="inkf"/>
    <ellipse cx="29.4" cy="44.2" rx="2" ry="1.1" class="inkf"/>

    <!-- arms + hands -->
    <path d="M17.5,32 Q14,33 12.5,35.5" fill="none" stroke-width="1.6"/>
    <path d="M30.5,32 Q34,33 35.5,35.5" fill="none" stroke-width="1.6"/>
    <circle cx="11.8" cy="36.2" r="1.5" class="inkf"/>
    <circle cx="36.2" cy="36.2" r="1.5" class="inkf"/>

    <!-- bottle body + neck silhouette -->
    <path d="M22.5,14 L22.5,19 C20,20.6 17,23 17,27 L17,37.5
             C17,39.4 18.4,40 20,40 L28,40 C29.6,40 31,39.4 31,37.5
             L31,27 C31,23 28,20.6 25.5,19 L25.5,14 Z" fill="#1f5c38"/>

    <!-- gold foil collar on neck -->
    <path d="M22.3,14.5 L25.7,14.5 L25.7,19.2 C24.8,19.6 23.2,19.6 22.3,19.2 Z" fill="#c9a84c"/>

    <!-- burst foil top -->
    <path d="M21.4,14.8 L20.4,9.4 L22.6,11.6 L24,7.8 L25.4,11.6 L27.6,9.4 L26.6,14.8 Z" fill="#d8b85a"/>

    <!-- M medallion on neck -->
    <circle cx="24" cy="17.4" r="2.5" fill="#c9a84c"/>
    <text x="24" y="18.8" font-family="Georgia, serif" font-size="3.2" font-weight="700" text-anchor="middle" stroke="none" class="inkf">M</text>

    <!-- body shine -->
    <path d="M20,24 C18.7,26 18.5,29 19,32" fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.5"/>

    <!-- white label -->
    <rect x="18" y="29.5" width="12" height="9.5" rx="1.5" fill="#ffffff"/>

    <!-- face: closed happy eyes -->
    <path d="M20.6,33 Q21.9,31.4 23.2,33" fill="none" stroke-width="1.1"/>
    <path d="M24.8,33 Q26.1,31.4 27.4,33" fill="none" stroke-width="1.1"/>
    <!-- cheeks -->
    <circle cx="20.4" cy="35.6" r="1.1" fill="#f3b6b0" stroke="none"/>
    <circle cx="27.6" cy="35.6" r="1.1" fill="#f3b6b0" stroke="none"/>
    <!-- open smiling mouth + tongue -->
    <path d="M21.3,35 Q24,35 26.7,35 Q25.8,39 24,39 Q22.2,39 21.3,35 Z" fill="#7a2230" stroke-width="1.1"/>
    <ellipse cx="24" cy="38" rx="1.7" ry="1" fill="#e0556a" stroke="none"/>
  </g>
</svg>
