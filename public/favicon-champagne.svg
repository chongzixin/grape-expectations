<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    .bg { fill: #ffffff; }
    .rim { stroke: #d9cdb4; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #000000; }
      .rim { stroke: #3a3a3a; }
    }
  </style>
  <rect class="bg rim" x="1" y="1" width="30" height="30" rx="7" stroke-width="1"/>

  <!-- bubbles -->
  <circle cx="22" cy="6" r="1" fill="#c9a84c"/>
  <circle cx="24.5" cy="4" r="0.7" fill="#c9a84c"/>

  <!-- champagne bottle -->
  <g stroke="#ede4d2" stroke-width="0.9" stroke-linejoin="round">
    <!-- body -->
    <path d="M11.5,16 C11.5,13 13.3,11.8 14,10 L14,8.5 L18,8.5 L18,10 C18.7,11.8 20.5,13 20.5,16 L20.5,25.5 C20.5,27 19.5,27.8 18,27.8 L14,27.8 C12.5,27.8 11.5,27 11.5,25.5 Z" fill="#226b43"/>
    <!-- foil neck -->
    <path d="M14,8.5 L18,8.5 L18,6 L14,6 Z" fill="#c9a84c"/>
    <!-- cork -->
    <rect x="14.3" y="3.8" width="3.4" height="2.6" rx="0.7" fill="#14502f"/>
  </g>

  <!-- label -->
  <rect x="11.7" y="18.5" width="8.6" height="7" fill="#ede4d2"/>
  <!-- face -->
  <circle cx="14.6" cy="21" r="0.8" fill="#14502f"/>
  <circle cx="17.4" cy="21" r="0.8" fill="#14502f"/>
  <path d="M14.3,22.8 Q16,24.4 17.7,22.8" fill="none" stroke="#a3322e" stroke-width="0.9" stroke-linecap="round"/>

  <!-- body shine -->
  <path d="M13.3,13.5 C12.6,15 12.6,18 13,21" fill="none" stroke="#ffffff" stroke-width="1" stroke-linecap="round" opacity="0.55"/>
</svg>
