<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grape Expectations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="static-splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:#0a0706;">
      <style>
        @keyframes _ss-spin { to { transform: rotate(360deg); } }
        #static-splash-spinner {
          width: 32px; height: 32px;
          border: 2px solid rgba(201,168,76,0.2);
          border-top-color: #c9a84c;
          border-radius: 50%;
          animation: _ss-spin 0.8s linear infinite;
        }
      </style>
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" style="opacity:0.9">
        <path d="M 7,4 Q 4,18 18,25 Q 32,18 29,4 Z" stroke="#c9a84c" stroke-width="1.5" stroke-linejoin="round"/>
        <line x1="18" y1="25" x2="18" y2="33" stroke="#c9a84c" stroke-width="1.5"/>
        <path d="M 10,33 Q 18,35 26,33" stroke="#c9a84c" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <div style="font-family:'Lato',sans-serif;font-size:22px;font-weight:700;color:#c9a84c;letter-spacing:2px;">Grape Expectations</div>
      <div id="static-splash-spinner"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/js/main.tsx"></script>
  </body>
</html>
