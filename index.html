<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grape Expectations</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <!--
      Set theme before first paint to avoid a light→dark or dark→light flash.
      Mirrors the time-based logic in App.tsx (sunrise 6:30am, sunset 7:30pm).
      Runs synchronously so the correct CSS variables are active from the very
      first rendered frame — no splash screen needed.
    -->
    <script>
      const t = new Date().getHours() * 60 + new Date().getMinutes();
      document.documentElement.setAttribute('data-theme', t >= 390 && t < 1170 ? 'light' : 'dark');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/js/main.tsx"></script>
  </body>
</html>
